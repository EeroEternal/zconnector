name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3073+28ae5d415

      - name: Check formatting
        run: zig fmt --check build.zig src examples

      - name: Build and test
        run: zig build test && zig build